name: keep-alive

# Mantiene despierta la instancia free de Render haciéndole ping periódico.
# Render duerme el servicio tras ~15 min de inactividad; pingamos cada ~10 min.
on:
  schedule:
    # Cada 10 minutos (UTC). GitHub puede retrasar/saltar ejecuciones bajo carga,
    # por eso usamos 10 min y no 14, para tener margen frente al límite de 15.
    - cron: "*/10 * * * *"
  workflow_dispatch:   # permite dispararlo manualmente desde la pestaña Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          URL="https://bt-actividades.onrender.com/api/v1/actividades/fases"
          echo "Pinging $URL"
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 "$URL")
          echo "HTTP $code"
          # 200 = OK. No fallamos el job aunque la primera petición despierte el
          # contenedor (puede tardar ~50s); el objetivo es solo generar tráfico.
          if [ "$code" != "200" ]; then
            echo "Aviso: respuesta inesperada ($code), pero el ping ya generó actividad."
          fi
