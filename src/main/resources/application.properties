server.port=${PORT:3000}

logging.level.org.springframework.web.cors=DEBUG

# ── Zona horaria ─────────────────────────────────────────────────────────────
# El servidor corre en US-East (Virginia). Se fuerza México Central para que
# LocalDateTime.now(), LocalTime.now() y ZoneId.systemDefault() sean correctos.
app.timezone=America/Mexico_City
# Serialización JSON de timestamps también en hora México
spring.jackson.time-zone=America/Mexico_City

# ── Bitácora / Scoca externa ─────────────────────────────────────────────────
# El login se realiza contra https://scoca.casystem.com.mx/api/auth/login
# con el usuario/contraseña que llega en cada petición (ver BitacoraTokenManager).
# idTipoActividad que corresponde a "Servicio" en el catálogo de Scoca.
# Solo en este tipo el campo "fase" es obligatorio y se envía al backend de Scoca.
app.bitacora.tipo-actividad-servicio-id=${BITACORA_TIPO_SERVICIO_ID:4}

# ── Carga de archivos (importación CSV de work items) ────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
