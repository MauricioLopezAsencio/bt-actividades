server.port=${PORT:3000}

logging.level.org.springframework.web.cors=DEBUG

# ── Formato de logs en consola ───────────────────────────────────────────────
# Columnas alineadas para leer fácil: hora | nivel | txId | hilo | logger : mensaje
# - txId: id de transacción del MdcFilter (8 chars); vacío en logs de arranque.
# - %clr aplica color si la consola lo soporta; si no (p. ej. Render), sale plano.
logging.pattern.console=%clr(%d{HH:mm:ss.SSS}){faint} %clr(%-5p) %clr([%-8.8X{transactionId:-}]){magenta} %clr([%-12.12t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx
# Mismo formato sin colores para el archivo de log (si se habilita logging.file.name)
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5p [%-8.8X{transactionId:-}] [%-12.12t] %-40.40logger{39} : %m%n%wEx

# ── Zona horaria ─────────────────────────────────────────────────────────────
# El servidor corre en US-East (Virginia). Se fuerza México Central para que
# LocalDateTime.now(), LocalTime.now() y ZoneId.systemDefault() sean correctos.
app.timezone=America/Mexico_City
# Serialización JSON de timestamps también en hora México
spring.jackson.time-zone=America/Mexico_City

# ── Bitácora / Scoca externa ─────────────────────────────────────────────────
# El login se realiza contra https://scoca.casystem.com.mx/api/auth/login
# con el usuario/contraseña que llega en cada petición (ver BitacoraTokenManager).
# idTipoActividad que corresponde a "Servicio" en el catálogo de Scoca.
# Solo en este tipo el campo "fase" es obligatorio y se envía al backend de Scoca.
app.bitacora.tipo-actividad-servicio-id=${BITACORA_TIPO_SERVICIO_ID:4}

# ── Carga de archivos (importación CSV de work items) ────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Keep-alive (self-ping) ───────────────────────────────────────────────────
# En producción (Render) toma la URL de RENDER_EXTERNAL_URL y pingea cada 10 min, 24/7.
# En local no existe RENDER_EXTERNAL_URL, así que la tarea se autodesactiva.
# Para PROBARLO EN LOCAL, descomenta el bloque de abajo:
#   - base-url   apunta al puerto local (server.port=${PORT:3000})
#   - cron       "*/10 * * * * *" = cada 10 s a toda hora, para verlo rápido en consola
# ¡NO subas estas líneas descomentadas a producción! (vuelve a comentarlas antes del commit)
#app.keep-alive.base-url=http://localhost:3000
#app.keep-alive.cron=*/10 * * * * *
